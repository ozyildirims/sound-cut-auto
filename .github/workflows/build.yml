name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed for electron-builder to publish a release on tag pushes

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer + main
        run: npm run build

      - name: Fetch sidecar binaries (auto-editor + ffmpeg/ffprobe)
        shell: bash
        run: |
          npm run fetch:all
          # mac runner is arm64 but we build both DMG arches — pull the x64
          # auto-editor binary too so the Intel DMG isn't shipped without one.
          if [ "$RUNNER_OS" = "macOS" ]; then
            node scripts/fetch-auto-editor.mjs darwin-x64 || true
          fi

      # Empty string secrets are still rendered into env by GitHub Actions and
      # electron-builder treats CSC_LINK="" as a cert file path → "not a file"
      # crash. The signing env block below only takes effect when the secret
      # actually has a value, so unsigned dev releases just work.
      - name: Package (macOS)
        if: matrix.os == 'macos-14'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
        run: |
          if [ -n "${{ secrets.MAC_CSC_LINK }}" ]; then
            export CSC_LINK="${{ secrets.MAC_CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.MAC_CSC_KEY_PASSWORD }}"
          fi
          npx electron-builder --mac --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "${{ secrets.WIN_CSC_LINK }}" ]; then
            export CSC_LINK="${{ secrets.WIN_CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.WIN_CSC_KEY_PASSWORD }}"
          fi
          npx electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}

      - name: Upload artifacts
        if: '!startsWith(github.ref, ''refs/tags/v'')'
        uses: actions/upload-artifact@v4
        with:
          name: sound-cut-auto-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.yml
          if-no-files-found: ignore
