<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#0b0d10"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d82ff"/>
      <stop offset="100%" stop-color="#5a3dff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- soft accent halo -->
  <circle cx="512" cy="512" r="320" fill="#7c5cff" opacity="0.06"/>

  <!-- waveform bars (left half) -->
  <g fill="url(#wave)" filter="url(#glow)">
    <rect x="160" y="448"  width="40" height="128" rx="20"/>
    <rect x="220" y="384"  width="40" height="256" rx="20"/>
    <rect x="280" y="320"  width="40" height="384" rx="20"/>
    <rect x="340" y="272"  width="40" height="480" rx="20"/>
    <rect x="400" y="368"  width="40" height="288" rx="20"/>
  </g>

  <!-- cut gap (intentional silence carved out) -->
  <rect x="462" y="240" width="100" height="544" fill="#0b0d10"/>
  <line x1="512" y1="200" x2="512" y2="824" stroke="#7c5cff" stroke-width="6" stroke-dasharray="14 18" stroke-linecap="round" opacity="0.85"/>

  <!-- waveform bars (right half) -->
  <g fill="url(#wave)" filter="url(#glow)">
    <rect x="584" y="368" width="40" height="288" rx="20"/>
    <rect x="644" y="272" width="40" height="480" rx="20"/>
    <rect x="704" y="320" width="40" height="384" rx="20"/>
    <rect x="764" y="384" width="40" height="256" rx="20"/>
    <rect x="824" y="448" width="40" height="128" rx="20"/>
  </g>
</svg>
